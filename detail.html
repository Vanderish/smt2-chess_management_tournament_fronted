<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelola Room Tournament - TournamentMS</title>
    <link rel="icon" type="image/png" href="./partials/LogoTournament.png">
    
    <link rel="stylesheet" href="style/global.css">
    <link rel="stylesheet" href="style/detail.css">
</head>
<body>

    <nav class="navbar" id="navbar-container"></nav>

    <div class="detail-container">
        
        <div class="header-title-section">
            <div class="header-actions">
                <button class="back-btn-page" id="btn-back">
                    <svg xmlns="http://www.w3.org/2000/svg" height="20px" viewBox="0 -960 960 960" width="20px" fill="currentColor"><path d="M400-80 0-480l400-400 71 71-329 329 329 329-71 71Z"/></svg>
                    Back
                </button>
                <button id="btn-start-tournament" class="btn-start-tournament hidden">Mulai Lomba</button>
                <button class="btn-delete-room" id="btn-delete-room">Delete Room</button>
            </div>
            
            <div class="header-text">
                <h1 id="detail-name">Memuat Nama...</h1>
                <div class="header-labels">
                    <span class="category-badge" id="detail-category">-</span>
                    <span id="detail-status" class="status-badge status-waiting">-</span>
                </div>
            </div>
        </div>

        <div class="content-grid">
            
            <div class="left-column">
                
                <div class="add-participant-card" id="add-participant-card">
                    <h3>Tambah Peserta</h3>
                    <form id="form-add-participant">
                        <input type="text" id="input-participant-name" placeholder="Nama Tim / Peserta" required>
                        <button type="submit" class="btn-add">Tambah</button>

                        <button class="btn-qr" id="btn-generate-qr">Generate QR Code</button>
                        <div class="qr-display" id="qr-box">
                            <img id="qr-image" src="" alt="QR Code">
                            <p>Scan Info Tournament</p>
                        </div>
                    </form>
                </div>
            </div>

            <div class="right-column">
                <h3 id="bracket-header">Bagan Pertandingan</h3>
                
                <div id="bracket-container" class="bracket-container">
                </div>

                <div class="teams-card">
                    <h3>Tim Terdaftar</h3>
                    <ul id="detail-teams" class="teams-list">
                    </ul>
                </div>

                <div id="leaderboard-container" class="leaderboard-container">
                    <h2 class="leaderboard-title">Hasil Akhir Turnamen</h2>
                    <div class="podium">
                        <div class="podium-item runner-up">
                            <div class="medal">🥈</div>
                            <div class="team-name" id="juara-2-name">BYE</div>
                            <div class="podium-stand silver">Juara 2</div>
                        </div>
                        <div class="podium-item champion">
                            <div class="medal">🥇</div>
                            <div class="team-name" id="juara-1-name">BYE</div>
                            <div class="podium-stand gold">Juara 1</div>
                        </div>
                    </div>
                </div>

                <div id="teams-card-registration" class="teams-card teams-card-hidden">
                    <h3>Tim Terdaftar</h3>
                    <ul id="detail-teams-registration" class="teams-list">
                    </ul>
                </div>

            </div>

        </div>
    </div>

    <button id="btn-start-tournament" class="btn-start-tournament hidden">Mulai Lomba</button>

    <script src="script/snackbar.js"></script>
    <script type="module" src="script/detail.js"></script>
    <script src="script/loadNavbar.js"></script>
</body>
</html>
